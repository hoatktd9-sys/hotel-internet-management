<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Xác nhận thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">

            Xác nhận thanh toán

        </h2>

        <table class="table table-bordered">

            <!-- KHÁCH -->

            <tr>

                <th>Khách hàng</th>

                <td th:text="${checkIn.customer.fullName}"></td>

            </tr>

            <!-- PHÒNG -->

            <tr>

                <th>Phòng</th>

                <td th:text="${checkIn.room.roomName}"></td>

            </tr>

            <!-- CHECK-IN -->

            <tr>

                <th>Giờ check-in</th>

                <td th:text="${#temporals.format(checkIn.checkInTime, 'yyyy-MM-dd HH:mm:ss')}"></td>

            </tr>

            <!-- CHECK-OUT -->

            <tr>

                <th>Giờ check-out</th>

                <td th:text="${#temporals.format(checkIn.checkOutTime, 'yyyy-MM-dd HH:mm:ss')}"></td>

            </tr>

            <!-- TỔNG GIỜ -->

            <tr>

                <th>Tổng giờ sử dụng</th>

                <td>

                    <span th:text="${#numbers.formatDecimal(checkIn.totalHours,1,2)}"></span>

                    giờ

                </td>

            </tr>

            <!-- ĐƠN GIÁ -->

            <tr>

                <th>Đơn giá phòng</th>

                <td>

                    <span th:text="${checkIn.room.price}"></span>

                    VNĐ / giờ

                </td>

            </tr>

            <!-- THÀNH TIỀN -->

            <tr class="table-success">

                <th>THÀNH TIỀN</th>

                <td>

                    <b>

                        <span th:text="${#numbers.formatDecimal(checkIn.totalPrice,1,0)}"></span>

                        VNĐ

                    </b>

                </td>

            </tr>

        </table>

        <!-- FORM XÁC NHẬN -->

        <form th:action="@{/billing/confirm}"
              method="post">

            <!-- ID -->

            <input type="hidden"
                   name="id"
                   th:value="${checkIn.id}">

            <div class="d-flex justify-content-between mt-4">

                <!-- HỦY -->

                <a href="/rooms"
                   class="btn btn-secondary">

                    Hủy

                </a>

                <!-- XÁC NHẬN -->

                <button type="submit"
                        class="btn btn-success">

                    Xác nhận thanh toán

                </button>

            </div>

        </form>

    </div>

</div>

</body>

</html>
