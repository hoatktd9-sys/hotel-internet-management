<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; padding: 30px; }
        .card-custom { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .badge-vip { background-color: #ffd700; color: #000; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý dữ liệu khách hàng</h2>
            <a href="/rooms" class="btn btn-secondary">← Quay lại danh sách phòng</a>
        </div>

        <form th:action="@{/customers/search}" method="GET" class="row g-3 mb-4">
            <div class="col-md-9">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo họ tên, số điện thoại hoặc số CCCD...">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ và tên</th>
                    <th>Số CCCD</th>
                    <th>Số điện thoại</th>
                    <th>Hạng khách hàng</th>
                    <th>Trạng thái</th>
                    <th>Thao tác nhanh</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${list}">
                    <td th:text="${c.id}"></td>
                    <td><span th:text="${c.fullName}" class="fw-bold"></span></td>
                    <td th:text="${c.identityNumber}"></td>
                    <td th:text="${c.phoneNumber}"></td>
                    <td>
                        <span th:if="${c.vip}" class="badge badge-vip text-dark">⭐ VIP</span>
                        <span th:unless="${c.vip}" class="badge bg-light text-dark">Thường</span>
                    </td>
                    <td>
                        <span th:if="${c.isActive}" class="badge bg-success">Đang hoạt động</span>
                        <span th:unless="${c.isActive}" class="badge bg-danger">Đang bị khóa</span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/customers/toggle-vip/{id}(id=${c.id})}"
                               th:class="${c.vip} ? 'btn btn-outline-warning btn-sm' : 'btn btn-warning btn-sm'"
                               th:text="${c.vip} ? 'Hủy VIP' : 'Kích VIP'"></a>

                            <a th:href="@{/customers/toggle-active/{id}(id=${c.id})}"
                               th:class="${c.isActive} ? 'btn btn-outline-danger btn-sm' : 'btn btn-success btn-sm'"
                               th:text="${c.isActive} ? 'Khóa máy' : 'Mở khóa'"></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="7" class="text-center text-muted py-3">Không có thông tin khách hàng nào phù hợp!</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
