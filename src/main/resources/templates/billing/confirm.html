<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Xác nhận thanh toán')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Xác nhận thanh toán')}"></div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Xác nhận thanh toán</h3>
            <a href="/rooms" class="btn btn-secondary">Quay lại</a>
        </div>

        <div class="card-box">
            <table class="table table-bordered table-striped bg-white">
                <tr>
                    <th style="width: 40%;">Khách hàng</th>
                    <td th:text="${checkIn.customer.fullName}"></td>
                </tr>
                <tr>
                    <th>Phòng</th>
                    <td th:text="${checkIn.room.roomName}"></td>
                </tr>
                <tr>
                    <th>Giờ check-in</th>
                    <td th:text="${#temporals.format(checkIn.checkInTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
                <tr>
                    <th>Giờ check-out</th>
                    <td th:text="${#temporals.format(checkIn.checkOutTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
                <tr>
                    <th>Tổng giờ sử dụng</th>
                    <td><span th:text="${#numbers.formatDecimal(checkIn.totalHours,1,2)}"></span> giờ</td>
                </tr>
                <tr>
                    <th>Đơn giá phòng</th>
                    <td><span th:text="${checkIn.room.price}"></span> VNĐ / giờ</td>
                </tr>
                <tr class="table-success">
                    <th>THÀNH TIỀN</th>
                    <td>
                        <b class="text-success" style="font-size: 1.2rem;">
                            <span th:text="${#numbers.formatDecimal(checkIn.totalPrice,1,0)}"></span> VNĐ
                        </b>
                    </td>
                </tr>
            </table>

            <form th:action="@{/billing/confirm}" method="post" class="mt-4">
                <input type="hidden" name="id" th:value="${checkIn.id}">
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Xác nhận thanh toán</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
