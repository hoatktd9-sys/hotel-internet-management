<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ chối truy cập - 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .error-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 50px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .error-code {
            font-size: 72px;
            font-weight: 800;
            color: #dc3545; /* Màu đỏ cảnh báo giống nút Xóa */
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .error-message {
            color: #6c757d;
            margin-bottom: 30px;
        }
        .btn-back {
            background-color: #0d6efd; /* Màu xanh giống nút Check-in */
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-code">403</div>
    <div class="error-title">Truy cập bị từ chối!</div>
    <p class="error-message">
        Tài khoản của bạn không có quyền truy cập vào khu vực quản trị này.
        Vui lòng liên hệ Admin nếu bạn nghĩ đây là một sự nhầm lẫn.
    </p>
    <a href="/rooms" class="btn-back">Quay về trang chủ</a>
</div>

</body>
</html>
