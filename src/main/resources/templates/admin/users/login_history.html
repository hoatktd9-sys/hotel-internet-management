<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Lịch sử đăng nhập - Admin')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Lịch sử đăng nhập')}"></div>

    <div class="card-box mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-clock-history text-warning"></i> Lịch sử hoạt động đăng nhập nhân viên</h3>
            <div class="d-flex gap-2">
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
            </div>
        </div>

        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên nhân viên</th>
                <th>Thời gian đăng nhập</th>
                <th>Địa chỉ IP</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${history}">
                <td th:text="${h.id}"></td>
                <td class="fw-bold text-primary" th:text="${h.username}"></td>
                <td th:text="${#temporals.format(h.loginTime, 'dd-MM-yyyy HH:mm:ss')}"></td>
                <td th:text="${h.ipAddress}"></td>
                <td>
                    <span class="badge bg-success" th:text="${h.status}"></span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(history)}">
                <td colspan="5" class="text-center text-muted">Chưa có lịch sử đăng nhập nào.</td>
            </tr>
            </tbody>
        </table>

        <!-- Phân trang -->
        <nav aria-label="Page navigation" th:if="${totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/login-history(page=${currentPage - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/admin/login-history(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/login-history(page=${currentPage + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
