<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật khách hàng' : 'Thêm khách hàng mới'">Quản lý khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width: 600px; margin: auto;">

        <h2 class="mb-4 text-primary text-center"
            th:text="${isEdit} ? 'CẬP NHẬT KHÁCH HÀNG' : 'THÊM KHÁCH HÀNG MỚI'">
            Thêm khách hàng
        </h2>

        <form th:if="${isEdit}" th:action="@{/customers/update}" th:object="${customer}" method="post">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{vip}">
            <input type="hidden" th:field="*{active}">

            <div class="mb-3">
                <label class="form-label fw-bold">Họ và tên</label>
                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nhập họ và tên..." required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số CCCD / Passport</label>
                <input type="text" class="form-control" th:field="*{identityNumber}"
                       placeholder="Nhập số căn cước công dân..." required th:readonly="${isEdit}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('identityNumber')}" th:errors="*{identityNumber}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phoneNumber}" placeholder="Nhập số điện thoại..." required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
                <a href="/customers" class="btn btn-secondary">Quay lại</a>
                <button type="submit" class="btn btn-success px-4" th:text="${isEdit} ? 'Cập nhật ngay' : 'Lưu khách hàng'"></button>
            </div>
        </form>

        <form th:unless="${isEdit}" th:action="@{/customers/save}" th:object="${customer}" method="post">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{vip}">
            <input type="hidden" th:field="*{active}">

            <div class="mb-3">
                <label class="form-label fw-bold">Họ và tên</label>
                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nhập họ và tên..." required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số CCCD / Passport</label>
                <input type="text" class="form-control" th:field="*{identityNumber}"
                       placeholder="Nhập số căn cước công dân..." required th:readonly="${isEdit}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('identityNumber')}" th:errors="*{identityNumber}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phoneNumber}" placeholder="Nhập số điện thoại..." required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
                <a href="/customers" class="btn btn-secondary">Quay lại</a>
                <button type="submit" class="btn btn-success px-4" th:text="${isEdit} ? 'Cập nhật ngay' : 'Lưu khách hàng'"></button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
