<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng internet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:15px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Quản lý phòng internet</h2>

        <a href="/create"
           class="btn btn-success">
            Thêm phòng
        </a>
    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Tên phòng</th>
                    <th>Giá</th>
                    <th>Số máy</th>
                    <th>Loại phòng</th>
                    <th>Mô tả</th>
                    <th>Chức năng</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="r : ${list}">

                    <td th:text="${r.id}"></td>

                    <td th:text="${r.roomName}"></td>

                    <td th:text="${r.price}"></td>

                    <td th:text="${r.computerCount}"></td>

                    <td th:text="${r.roomType}"></td>

                    <td th:text="${r.description}"></td>

                    <td>

                        <a th:href="@{/edit/{id}(id=${r.id})}"
                           class="btn btn-warning btn-sm">
                            Sửa
                        </a>

                        <a th:href="@{/delete/{id}(id=${r.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa?')">
                            Xóa
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
