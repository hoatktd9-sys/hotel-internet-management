```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Sửa khuyến mãi' : 'Thêm khuyến mãi'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card{
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header{
            background: linear-gradient(135deg,#1a1a2e,#16213e);
        }

        .btn-save{
            background: linear-gradient(135deg,#f5c518,#e6a817);
            border:none;
            color:#1a1a2e;
            font-weight:600;
        }

        .btn-save:hover{
            background: linear-gradient(135deg,#e6a817,#d4961a);
            color:#1a1a2e;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#f5c518;
            box-shadow:0 0 0 .2rem rgba(245,197,24,.25);
        }
    </style>
</head>
<body>

<div class="container mt-5" style="max-width:750px">

    <div class="card shadow">

        <div class="card-header text-white p-4">
            <h4 class="mb-0"
                th:text="${isEdit} ? 'Sửa chương trình khuyến mãi' : 'Thêm chương trình khuyến mãi'}">
            </h4>
        </div>

        <div class="card-body p-4">

            <!-- Thông báo -->
            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <form th:action="${isEdit} ? @{/update} : @{/save}"
                  th:object="${promotion}"
                  method="post">

                <!-- ID -->
                <input type="hidden" th:field="*{id}">

                <!-- Tiêu đề -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Tiêu đề khuyến mãi
                    </label>

                    <input type="text"
                           th:field="*{title}"
                           class="form-control"
                           placeholder="Nhập tiêu đề khuyến mãi">

                    <div class="text-danger small mt-1"
                         th:errors="*{title}">
                    </div>
                </div>

                <!-- Ngày bắt đầu -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Ngày bắt đầu
                    </label>

                    <input type="date"
                           th:field="*{startDate}"
                           class="form-control">

                    <div class="text-danger small mt-1"
                         th:errors="*{startDate}">
                    </div>
                </div>

                <!-- Ngày kết thúc -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Ngày kết thúc
                    </label>

                    <input type="date"
                           th:field="*{endDate}"
                           class="form-control">

                    <div class="text-danger small mt-1"
                         th:errors="*{endDate}">
                    </div>
                </div>

                <!-- Mức giảm giá -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Mức giảm giá (VNĐ)
                    </label>

                    <input type="number"
                           th:field="*{discount}"
                           class="form-control"
                           placeholder="Ví dụ: 50000">

                    <div class="text-danger small mt-1"
                         th:errors="*{discount}">
                    </div>
                </div>

                <!-- Chi tiết -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Chi tiết khuyến mãi
                    </label>

                    <textarea th:field="*{detail}"
                              class="form-control"
                              rows="4"
                              placeholder="Nhập nội dung chi tiết..."></textarea>

                    <div class="text-danger small mt-1"
                         th:errors="*{detail}">
                    </div>
                </div>

                <!-- Button -->
                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-save px-4">
                        <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'}"></span>
                    </button>

                    <a href="/promotions"
                       class="btn btn-secondary px-4">
                        Quay lại
                    </a>

                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
```
