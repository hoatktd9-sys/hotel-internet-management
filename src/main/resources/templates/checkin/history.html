<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lịch sử sử dụng phòng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>Lịch sử sử dụng phòng</h2>

        <a href="/rooms"
           class="btn btn-secondary">

            Quay lại

        </a>

    </div>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Khách hàng</th>

            <th>Phòng</th>

            <th>Check-in</th>

            <th>Check-out</th>

            <th>Tổng giờ</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="c : ${list}">

            <!-- ID -->

            <td th:text="${c.id}"></td>

            <!-- KHÁCH -->

            <td th:text="${c.customer.fullName}"></td>

            <!-- PHÒNG -->

            <td th:text="${c.room.roomName}"></td>

            <!-- CHECKIN -->

            <td th:text="${#temporals.format(c.checkInTime, 'yyyy-MM-dd HH:mm:ss')}"></td>

            <!-- CHECKOUT -->

            <td>

                <span th:if="${c.checkOutTime != null}"
                      th:text="${#temporals.format(c.checkOutTime, 'yyyy-MM-dd HH:mm:ss')}">
                </span>

                <span th:if="${c.checkOutTime == null}">
                    Đang sử dụng
                </span>

            </td>

            <!-- TỔNG GIỜ -->

            <td>

                <span th:if="${c.totalHours != null}"
                      th:text="${#numbers.formatDecimal(c.totalHours,1,2)}">
                </span>

                <span th:if="${c.totalHours == null}">
                    ---
                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
