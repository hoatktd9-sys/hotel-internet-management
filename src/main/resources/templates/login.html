<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý phòng internet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Đồng bộ với màu nền xám nhạt nhẹ của trang quản lý trong hình */
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            /* Giống style đổ bóng và bo góc của các card Room 101, TestRoom */
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            color: #212529;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .form-control {
            background-color: #fff;
            border: 1px solid #ced4da;
            color: #212529;
            padding: 10px 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary {
            /* Đồng bộ với màu nút "Check-in" xanh dương tươi trên hình */
            background-color: #0d6efd;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Quản lý phòng internet</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Tài khoản hoặc mật khẩu không chính xác.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Bạn đã đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Tài khoản</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tài khoản..." required autofocus>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu..." required>
        </div>
        <button type="submit" class="btn btn-primary">Đăng nhập</button>
    </form>
</div>

</body>
</html>
