<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .menu-card { border: none; transition: transform 0.2s; border-radius: 12px; overflow: hidden; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .price-tag { color: #dc3545; font-weight: bold; font-size: 1.2rem; }
        .category-header { border-left: 5px solid #0d6efd; padding-left: 10px; margin-vertical: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">📋 THỰC ĐƠN DỊCH VỤ KHÁCH SẠN</h2>
        <a href="/rooms" class="btn btn-secondary">← Quay lại sảnh chính</a>
    </div>

    <div th:each="cat : ${categories}" class="mb-5">
        <h3 class="category-header mb-4" th:text="${cat.name}">Tên Nhóm Dịch Vụ</h3>

        <div class="row g-3">
            <div th:each="prod : ${products}" th:if="${prod.category != null && prod.category.id == cat.id}" class="col-md-4 col-sm-6">
                <div class="card h-100 menu-card shadow-sm">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="card-title fw-bold text-dark" th:text="${prod.name}">Tên món</h5>
                            <p class="card-text text-muted small" th:text="${prod.description}">Mô tả ngắn...</p>
                        </div>
                        <div class="mt-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="price-tag" th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                                <span th:if="${prod.stockQuantity > 0}" class="badge bg-success">Còn hàng</span>
                                <span th:if="${prod.stockQuantity <= 0}" class="badge bg-danger">Hết hàng</span>
                            </div>

                            <form th:action="@{/admin/products/order}" method="post" class="mt-2">
                                <input type="hidden" name="productId" th:value="${prod.id}">
                                <input type="hidden" name="roomId" th:value="${currentRoomId}">

                                <div class="input-group input-group-sm mb-2" th:if="${currentRoomId != null}">
                                    <span class="input-group-text bg-light text-dark">SL:</span>
                                    <input type="number" name="quantity" value="1" min="1" th:max="${prod.stockQuantity}" class="form-control text-center" required>
                                </div>

                                <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold"
                                        th:disabled="${prod.stockQuantity <= 0 || currentRoomId == null}"
                                        th:text="${currentRoomId != null ? '🛒 Xác nhận gọi món' : '🔒 Chọn phòng trước khi đặt'}">
                                    Xác nhận gọi món
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
