<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Gaming Hotel'">Gaming Hotel</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            margin: 0;
            overflow-x: hidden;
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.15);
            transition: var(--transition-smooth);
        }

        .sidebar-brand {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-brand i {
            font-size: 1.75rem;
            background: linear-gradient(135deg, #818cf8, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-brand span {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 1.5rem 0.75rem;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .sidebar-menu-header {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
        }

        .sidebar-menu-header:first-child {
            margin-top: 0;
        }

        .sidebar-item {
            margin-bottom: 0.25rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .sidebar-link:hover {
            color: #ffffff;
            background-color: var(--sidebar-hover);
        }

        .sidebar-link i {
            font-size: 1.25rem;
            transition: var(--transition-smooth);
        }

        .sidebar-link.active {
            color: #ffffff;
            background-color: var(--primary-color);
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.4);
        }

        .sidebar-link.active i {
            color: #ffffff;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .user-profile-widget {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #ffffff;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-name {
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 0.75rem;
            color: #64748b;
        }

        .btn-logout-sidebar {
            color: #f87171;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 0.5rem;
            transition: var(--transition-smooth);
        }

        .btn-logout-sidebar:hover {
            background-color: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        /* Main Content Container */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            min-height: 100vh;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: var(--transition-smooth);
        }

        /* Modern Page Header */
        .page-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1.5rem;
        }

        .page-title-group h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0 0 0.25rem 0;
            letter-spacing: -0.025em;
        }

        .page-title-group p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
        }

        /* Room Grid Card Styling */
        .room-card-premium {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .room-card-premium:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-shadow);
            border-color: #cbd5e1;
        }

        .room-card-image-wrapper {
            position: relative;
            height: 200px;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        .room-card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .room-card-premium:hover .room-card-image-wrapper img {
            transform: scale(1.05);
        }

        .room-badge-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
        }

        .badge-available {
            background-color: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .badge-occupied {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .badge-cleaning {
            background-color: #fffbeb;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .room-card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 1rem;
        }

        .room-card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .room-card-type {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
            background-color: rgba(79, 70, 229, 0.08);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
        }

        .room-card-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #475569;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-row i {
            color: #94a3b8;
            width: 1.25rem;
        }

        .room-card-footer {
            padding: 1.25rem 1.5rem;
            background-color: #f8fafc;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Buttons styles */
        .btn-premium {
            font-weight: 600;
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
        }

        .btn-premium-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #ffffff;
        }

        .btn-premium-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.35);
        }

        .btn-premium-success {
            background-color: #10b981;
            border-color: #10b981;
            color: #ffffff;
        }

        .btn-premium-success:hover {
            background-color: #059669;
            border-color: #059669;
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.35);
        }

        .btn-premium-warning {
            background-color: #f59e0b;
            border-color: #f59e0b;
            color: #ffffff;
        }

        .btn-premium-warning:hover {
            background-color: #d97706;
            border-color: #d97706;
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(245, 158, 11, 0.35);
        }

        .btn-premium-danger {
            background-color: #ef4444;
            border-color: #ef4444;
            color: #ffffff;
        }

        .btn-premium-danger:hover {
            background-color: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.35);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Responsive Breakpoints */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
</body>
</html>
