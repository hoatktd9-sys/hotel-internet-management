<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết phòng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            padding:40px;
        }

        .detail-box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .title{
            font-size:32px;
            font-weight:bold;
            margin-bottom:30px;
            text-align:center;
        }

        .info{
            margin-bottom:15px;
            font-size:18px;
        }

        .status{
            padding:6px 15px;
            border-radius:20px;
            font-weight:bold;
        }

        .available{
            background:#d4edda;
            color:#155724;
        }

        .occupied{
            background:#f8d7da;
            color:#721c24;
        }

        .cleaning{
            background:#fff3cd;
            color:#856404;
        }

        .maintenance{
            background:#d1ecf1;
            color:#0c5460;
        }

    </style>

</head>

<body>

<div class="detail-box">

    <div class="title">
        Chi tiết phòng
    </div>

    <div class="info">
        <b>ID:</b>
        <span th:text="${room.id}"></span>
    </div>

    <div class="info">
        <b>Tên phòng:</b>
        <span th:text="${room.roomName}"></span>
    </div>

    <div class="info">
        <b>Giá:</b>
        <span th:text="${#numbers.formatDecimal(room.price,1,0)}"></span>
        VNĐ / giờ
    </div>

    <div class="info">
        <b>Số máy:</b>
        <span th:text="${room.computerCount}"></span>
    </div>

    <div class="info">
        <b>Loại phòng:</b>
        <span th:text="${room.roomType}"></span>
    </div>

    <div class="info">
        <b>Mô tả:</b>
        <span th:text="${room.description}"></span>
    </div>

    <div class="info">

        <b>Trạng thái:</b>

        <span th:if="${room.status.name() == 'AVAILABLE'}"
              class="status available">
            Trống
        </span>

        <span th:if="${room.status.name() == 'OCCUPIED'}"
              class="status occupied">
            Đang sử dụng
        </span>

        <span th:if="${room.status.name() == 'CLEANING'}"
              class="status cleaning">
            Đang dọn dẹp
        </span>

        <span th:if="${room.status.name() == 'MAINTENANCE'}"
              class="status maintenance">
            Bảo trì
        </span>

    </div>

    <div class="mt-4 d-flex gap-2">

        <a href="/rooms"
           class="btn btn-secondary">
            Quay lại
        </a>

        <a th:href="@{/edit/{id}(id=${room.id})}"
           class="btn btn-warning">
            Sửa
        </a>

    </div>

</div>

</body>
</html>
