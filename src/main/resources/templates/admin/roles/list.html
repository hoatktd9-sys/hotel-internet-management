<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Quyền - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 30px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Gaming Hotel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/users">Nhân viên</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/roles">Quyền (Roles)</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light nav-link" type="submit">Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h2>Quản lý Roles & Permissions</h2>
    
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <a href="/admin/roles/create" sec:authorize="hasRole('ADMIN')"  class="btn btn-success">
         Thêm Vị Trí
    </a>
    <table class="table table-bordered table-striped bg-white mt-4">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên Role</th>
            <th>Mô tả</th>
            <th>Các Quyền đang có</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${roles}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.roleName}"></td>
            <td th:text="${r.description}"></td>
            <td>
                <span th:each="p : ${r.permissions}" class="badge bg-secondary me-1" th:text="${p.permissionName}"></span>
            </td>
            <td>
                <button type="button" class="btn btn-sm btn-info text-white" data-bs-toggle="modal" th:data-bs-target="'#editPermissionsModal' + ${r.id}">
                    Chỉnh sửa Quyền
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modals for Editing Permissions -->
<div th:each="r : ${roles}">
    <div class="modal fade" th:id="'editPermissionsModal' + ${r.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/roles/update-permissions/{id}(id=${r.id})}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="'Bật/tắt quyền cho Role: ' + ${r.roleName}"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-muted">Chọn các quyền bạn muốn bật cho Role này:</p>
                        <div th:each="p : ${allPermissions}" class="form-check">
                            <input class="form-check-input" type="checkbox" name="permissionIds" th:value="${p.id}" th:id="'r'+${r.id}+'p'+${p.id}"
                                   th:checked="${#lists.contains(r.permissions, p)}">
                            <label class="form-check-label" th:for="'r'+${r.id}+'p'+${p.id}">
                                <strong th:text="${p.permissionName}"></strong>
                                <small class="text-muted" th:text="' - ' + ${p.description}"></small>
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
