<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý loại phòng')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý loại phòng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
        <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-tags text-info"></i> Danh sách loại cấu hình phòng</h3>
        <div class="d-flex gap-2">
            <a href="/admin/room-types/create" class="btn btn-success fw-bold"><i class="bi bi-plus-circle"></i> Thêm loại phòng</a>
            <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
        </div>
    </div>
    
    <div class="card-box">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Loại Phòng</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rt : ${list}">
                    <td th:text="${rt.id}"></td>
                    <td th:text="${rt.name}"></td>
                    <td>
                        <a th:href="@{/admin/room-types/edit/{id}(id=${rt.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/admin/room-types/delete/{id}(id=${rt.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="3" class="text-center">Chưa có loại phòng nào.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
