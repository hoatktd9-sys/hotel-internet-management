<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng internet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            padding:30px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .room-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
            gap:20px;
        }

        .room-card{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .room-card:hover{
            transform:translateY(-5px);
        }

        .room-name{
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .room-price{
            font-size:18px;
            margin-bottom:10px;
        }

        .room-info{
            margin-bottom:8px;
        }

        .status{
            font-weight:bold;
            padding:5px 10px;
            border-radius:20px;
            display:inline-block;
            margin-bottom:15px;
        }

        .available{
            background:#d4edda;
            color:#155724;
        }

        .occupied{
            background:#f8d7da;
            color:#721c24;
        }

        .cleaning{
            background:#fff3cd;
            color:#856404;
        }

        .btn-group{
            display:flex;
            gap:10px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="top-bar">

        <h2>Quản lý phòng internet</h2>

        <div class="d-flex gap-2">

            <a href="/create"
               class="btn btn-success">

                + Thêm phòng

            </a>

            <a href="/checkin"
               class="btn btn-primary">

                Check-in

            </a>

        </div>

    </div>

    <div class="room-grid">

        <div class="room-card"
             th:each="r : ${list}">

            <div class="room-name"
                 th:text="${r.roomName}">
            </div>

            <div class="room-price">
                Giá:
                <span th:text="${r.price}"></span> VNĐ/giờ
            </div>

            <div class="room-info">
                Số máy:
                <span th:text="${r.computerCount}"></span>
            </div>

            <div class="room-info">
                Loại:
                <span th:text="${r.roomType}"></span>
            </div>

            <!-- STATUS -->

            <div>

                <span th:if="${r.status.name() == 'AVAILABLE'}"
                      class="status available">
                    Trống
                </span>

                <span th:if="${r.status.name() == 'OCCUPIED'}"
                      class="status occupied">
                    Đang sử dụng
                </span>

                <span th:if="${r.status.name() == 'CLEANING'}"
                      class="status cleaning">
                    Đang dọn dẹp
                </span>

            </div>

            <div class="room-info">
                <b>Mô tả:</b>
                <span th:text="${r.description}"></span>
            </div>

            <div class="btn-group mt-3">

                <a th:href="@{/edit/{id}(id=${r.id})}"
                   class="btn btn-warning btn-sm">
                    Sửa
                </a>

                <a th:href="@{/delete/{id}(id=${r.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa?')">
                    Xóa
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
