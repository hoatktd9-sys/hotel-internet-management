<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>Quản lý khách hàng</h2>
        <div class="d-flex.justify-content-between.mb-4">
            <a href="/customers/create" class="btn btn-success"
               sec:authorize="hasAuthority('Create_Customer')"
            >
                + Thêm khách hàng
            </a>
            <a href="/rooms" class="btn btn-secondary text-white">Quản lý phòng</a>
        </div>
    </div>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Họ tên</th>
            <th>CCCD</th>
            <th>Số điện thoại</th>
            <th>Hành động</th>
        </tr>

        </thead>

        <tbody>
        <tr th:each="c : ${list}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.fullName}"></td>
            <td th:text="${c.identityNumber}"></td>
            <td th:text="${c.phoneNumber}"></td>
            <td>
                <div class="d-flex gap-2">
                    <!-- SỬA -->
                    <a th:href="@{/customers/edit/{id}(id=${c.id})}"
                       sec:authorize="hasAuthority('Edit_Customer')"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <!-- XÓA -->
                    <a th:href="@{/customers/delete/{id}(id=${c.id})}"
                       class="btn btn-danger btn-sm"
                       sec:authorize="hasAuthority('Delete_Customer')"
                       onclick="return confirm('Bạn có chắc muốn xóa khách hàng này?')">
                        Xóa
                    </a>
                </div>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>

</html>
