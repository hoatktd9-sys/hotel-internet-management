<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Check In</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Check In</h2>

    <form th:action="@{/checkin/save}" method="post">

        <!-- CHỌN KHÁCH -->
        <div class="mb-3">

            <label class="form-label">
                Khách hàng
            </label>

            <select name="customerId"
                    class="form-select"
                    required>

                <option value="">
                    -- Chọn khách --
                </option>

                <option th:each="c : ${customers}"
                        th:value="${c.id}"
                        th:text="${c.fullName}">
                </option>

            </select>

        </div>

        <!-- CHỌN PHÒNG -->
        <div class="mb-3">

            <label class="form-label">
                Phòng
            </label>

            <select name="roomId"
                    class="form-select"
                    required>

                <option value="">
                    -- Chọn phòng --
                </option>

                <option th:each="r : ${rooms}"
                        th:value="${r.id}"
                        th:text="${r.roomName}">
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-primary">

            Check In

        </button>

        <a href="/rooms"
           class="btn btn-secondary">

            Quay lại

        </a>

    </form>

</div>

</body>
</html>
