<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý tài khoản - Admin')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý nhân viên')}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="card-box mb-4 bg-light p-3 rounded border">
        <form th:action="@{/admin/users}" th:method="get" class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label fw-semibold text-secondary small">Tìm theo tên</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" th:value="${usernameKey}" class="form-control" placeholder="Nhập tên đăng nhập...">
                </div>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold text-secondary small">Tìm theo email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" th:value="${emailKey}" class="form-control" placeholder="Nhập email...">
                </div>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold text-secondary small">Tìm theo Role</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-shield-lock"></i></span>
                    <select name="roleId" class="form-select">
                        <option value="">-- Chọn Role --</option>
                        <option th:each="r : ${allRoles}"
                                th:value="${r.id}"
                                th:text="${r.roleName}"
                                th:selected="${r.id == roleIdKey}"></option>
                    </select>
                </div>
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-secondary w-100 fw-bold">
                    <i class="bi bi-search"></i> Tìm Kiếm
                </button>
                <a th:href="@{/admin/users}" class="btn btn-outline-dark" title="Xóa bộ lọc">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </a>
            </div>
        </form>
    </div>
    <div class="card-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-people-fill text-primary"></i> Danh sách nhân viên</h3>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#createUserModal">
                    <i class="bi bi-plus-circle"></i> Tạo tài khoản mới
                </button>
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
            </div>
        </div>

    <table class="table table-bordered table-striped bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên đăng nhập</th>
            <th>Email</th>
            <th>Trạng thái</th>
            <th>Roles</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td>
                <span th:if="${u.isActive}" class="badge bg-success">Hoạt động</span>
                <span th:unless="${u.isActive}" class="badge bg-danger">Đã khóa</span>
            </td>
            <td>
                <span th:each="r : ${u.roles}" class="badge bg-info me-1" th:text="${r.roleName}"></span>
            </td>
            <td>
                <a th:href="@{/admin/users/toggle-lock/{id}(id=${u.id})}"
                   class="btn btn-sm" th:classappend="${u.isActive ? 'btn-warning' : 'btn-success'}"
                   th:text="${u.isActive ? 'Khóa' : 'Mở khóa'}"></a>

                <button type="button" class="btn btn-sm btn-info text-white" data-bs-toggle="modal" th:data-bs-target="'#assignRoleModal' + ${u.id}">
                    Gán Role
                </button>

                <button type="button" class="btn btn-sm btn-secondary" data-bs-toggle="modal" th:data-bs-target="'#resetPasswordModal' + ${u.id}">
                    Reset Password
                </button>

                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có muốn xóa người dùng này?')">
                    Xóa
                </a>

                <button type="button" class="btn btn-sm btn-warning" data-bs-toggle="modal" th:data-bs-target="'#updateModal' + ${u.id}">
                    Edit
                </button>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Phân trang -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, username=${usernameKey}, email=${emailKey}, roleId=${roleIdKey})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${i}, username=${usernameKey}, email=${emailKey}, roleId=${roleIdKey})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, username=${usernameKey}, email=${emailKey}, roleId=${roleIdKey})}">Sau</a>
            </li>
        </ul>
    </nav>
    </div>
</div>

<div class="modal fade" id="createUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/users/create}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Tạo tài khoản nhân viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Gán Roles ban đầu</label>
                        <div th:each="r : ${allRoles}">
                            <input type="checkbox" name="roleIds" th:value="${r.id}" th:id="'role_'+${r.id}">
                            <label th:for="'role_'+${r.id}" th:text="${r.roleName}"></label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Tạo mới</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:each="u : ${users}">
    <div class="modal fade" th:id="'assignRoleModal' + ${u.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/users/assign-role/{id}(id=${u.id})}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="'Gán Role cho ' + ${u.username}"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div th:each="r : ${allRoles}">
                            <input type="checkbox" name="roleIds" th:value="${r.id}" th:id="'u'+${u.id}+'r'+${r.id}"
                                   th:checked="${#lists.contains(u.roles, r)}">
                            <label th:for="'u'+${u.id}+'r'+${r.id}" th:text="${r.roleName}"></label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'resetPasswordModal' + ${u.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/users/reset-password/{id}(id=${u.id})}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="'Khôi phục mật khẩu: ' + ${u.username}"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'updateModal' + ${u.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/users/update/{id}(id=${u.id})}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="'Chỉnh sửa tài khoản: ' + ${u.username}"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>Tên mới</label>
                            <input type="text" name="newUsername" th:value="${u.username}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email mới</label>
                            <input type="email" name="newEmail" th:value="${u.email}" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-warning text-white">Thay Đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div> 
</body>
</html>
