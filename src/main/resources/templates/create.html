<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật phòng' : 'Thêm phòng'">Thêm phòng</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }
        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%; /* Cho nút bấm rộng toàn màn hình form cho đẹp */
            margin-top: 10px;
        }
        button:hover {
            background: #218838;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
        }
        .back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
        .back:hover {
            text-decoration: underline;
        }
        .preview-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .warning-box {
            color: #856404;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .warning-box a {
            color: #0056b3;
            font-weight: bold;
            text-decoration: none;
        }
        .warning-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 th:text="${isEdit} ? 'Cập nhật phòng internet' : 'Thêm phòng internet'">
        Thêm phòng internet
    </h1>

    <form th:action="@{${isEdit ? '/update/' + room.id : '/save'}}"
          th:object="${room}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <input type="hidden" th:field="*{image}">

        <div th:if="${room.image != null and room.image != ''}">
            <label class="fw-bold">Ảnh hiện tại:</label>
            <img th:src="@{/uploads/{img}(img=${room.image})}"
                 class="preview-image"
                 alt="Room Preview">
        </div>

        <label>Ảnh phòng</label>
        <input type="file" name="imageFile" accept="image/*">

        <div class="section-title">Thông tin phòng</div>

        <label>Tên phòng</label>
        <input type="text" th:field="*{roomName}">
        <div class="error" th:if="${#fields.hasErrors('roomName')}" th:errors="*{roomName}"></div>

        <label>Giá phòng (VNĐ/giờ)</label>
        <input type="number" th:field="*{price}">
        <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>

        <label>Số máy tính</label>
        <input type="number" th:field="*{computerCount}">
        <div class="error" th:if="${#fields.hasErrors('computerCount')}" th:errors="*{computerCount}"></div>

        <label>Loại phòng</label>

        <div class="warning-box" th:if="${roomTypes == null or #lists.isEmpty(roomTypes)}">
            Chưa có loại phòng nào. Vui lòng <a href="/room-types">tạo loại phòng trước</a>.
        </div>

        <select th:field="*{roomType.id}" required>
            <option value="">-- Chọn loại phòng --</option>
            <option th:each="type : ${roomTypes}"
                    th:value="${type.id}"
                    th:text="${type.name}">
            </option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('roomType')}" th:errors="*{roomType}"></div>

        <label>Mô tả phòng</label>
        <textarea rows="4" th:field="*{description}"></textarea>
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <div class="section-title">Cấu hình máy tính</div>

        <label>CPU</label>
        <input type="text" th:field="*{cpu}" placeholder="Ví dụ: Intel Core i5 12400F">
        <div class="error" th:if="${#fields.hasErrors('cpu')}" th:errors="*{cpu}"></div>

        <label>RAM</label>
        <input type="text" th:field="*{ram}" placeholder="Ví dụ: 16GB DDR4">
        <div class="error" th:if="${#fields.hasErrors('ram')}" th:errors="*{ram}"></div>

        <label>VGA</label>
        <input type="text" th:field="*{vga}" placeholder="Ví dụ: RTX 3060">
        <div class="error" th:if="${#fields.hasErrors('vga')}" th:errors="*{vga}"></div>

        <label>SSD</label>
        <input type="text" th:field="*{ssd}" placeholder="Ví dụ: SSD NVME 512GB">
        <div class="error" th:if="${#fields.hasErrors('ssd')}" th:errors="*{ssd}"></div>

        <label>Màn hình</label>
        <input type="text" th:field="*{monitor}" placeholder="Ví dụ: 27 inch 144Hz">
        <div class="error" th:if="${#fields.hasErrors('monitor')}" th:errors="*{monitor}"></div>

        <button type="submit" th:text="${isEdit} ? 'Cập nhật phòng' : 'Lưu phòng'">
            Lưu phòng
        </button>

    </form>

    <br>
    <a href="/rooms" class="back">← Quay lại danh sách</a>
</div>

</body>
</html>
