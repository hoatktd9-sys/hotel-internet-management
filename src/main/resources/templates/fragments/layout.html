<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Quản lý phòng internet'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            padding: 30px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div th:fragment="navbar(pageTitle)" class="top-bar">
    <a href="/rooms" class="text-decoration-none">
        <h1 th:text="${pageTitle}">Quản lý phòng internet</h1>
    </a>

    <div sec:authorize="isAuthenticated()" class="ms-auto me-3 align-self-center">
        Xin chào, <span sec:authentication="name" class="fw-bold text-primary">Tên_User</span>!
    </div>

    <div class="d-flex gap-2">
        <a href="/create" sec:authorize="hasRole('ADMIN')" class="btn btn-success">+ Thêm phòng</a>
        <a href="/admin/users" sec:authorize="hasRole('ADMIN')" class="btn btn-success">Danh sách Nhân Viên</a>
        <a th:href="@{/admin/roles}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Phân Quyền</a>
        <a href="/admin/room-types" class="btn btn-info text-white" sec:authorize="hasRole('ADMIN')">Quản lý loại phòng</a>
        <a href="/customers" class="btn btn-secondary text-white">Quản lý khách hàng</a>
        <a href="/checkin" class="btn btn-primary">Check-in</a>
        <a href="/checkin/history" class="btn btn-dark" sec:authorize="hasAuthority('View_History')">Lịch sử</a>
        <a href="/logout" class="btn btn-outline-danger">Đăng xuất</a>
    </div>
</div>

</body>
</html>
