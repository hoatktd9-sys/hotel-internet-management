<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý khách hàng')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý khách hàng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
    </div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 th:text="${isEdit} ? 'Sửa khách hàng' : 'Thêm khách hàng'"></h3>
            <a href="/customers" class="btn btn-secondary">Quay lại</a>
        </div>

        <div class="card-box">
        <form th:action="${isEdit} ? '/customers/update' : '/customers/save'" th:object="${customer}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" class="form-control" th:field="*{fullName}">
                <div class="text-danger" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">CCCD / Passport</label>
                <input type="text" class="form-control" th:field="*{identityNumber}">
                <div class="text-danger" th:errors="*{identityNumber}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phoneNumber}">
                <div class="text-danger" th:errors="*{phoneNumber}"></div>
            </div>

            <button type="submit" class="btn btn-success" th:text="${isEdit} ? 'Cập nhật' : 'Lưu khách hàng'"></button>
        </form>
    </div>
    </div>
</div>
</body>
</html>
