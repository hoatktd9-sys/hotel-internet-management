<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Loại Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f4f6f9; padding:30px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>Danh sách Loại Phòng</h1>
        <div class="d-flex gap-2">
            <a href="/room-types/create" class="btn btn-success">+ Thêm loại phòng</a>
            <a href="/rooms" class="btn btn-secondary">Quay lại Phòng</a>
        </div>
    </div>
    
    <table class="table table-bordered table-striped bg-white">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên Loại Phòng</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="rt : ${list}">
                <td th:text="${rt.id}"></td>
                <td th:text="${rt.name}"></td>
                <td>
                    <a th:href="@{/room-types/edit/{id}(id=${rt.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{/room-types/delete/{id}(id=${rt.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(list)}">
                <td colspan="3" class="text-center">Chưa có loại phòng nào.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
