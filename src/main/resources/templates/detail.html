<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết phòng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            padding:40px;
            font-family:Arial;
        }

        .detail-box{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .title{
            font-size:36px;
            font-weight:bold;
            margin-bottom:30px;
            text-align:center;
        }

        .room-image{
            width:100%;
            height:350px;
            object-fit:cover;
            border-radius:15px;
            margin-bottom:30px;
            border:1px solid #ddd;
        }

        .section-title{
            font-size:24px;
            font-weight:bold;
            margin-top:30px;
            margin-bottom:20px;
            border-bottom:2px solid #ddd;
            padding-bottom:10px;
        }

        .info{
            margin-bottom:15px;
            font-size:18px;
        }

        .status{
            padding:6px 15px;
            border-radius:20px;
            font-weight:bold;
        }

        .available{
            background:#d4edda;
            color:#155724;
        }

        .occupied{
            background:#f8d7da;
            color:#721c24;
        }

        .cleaning{
            background:#fff3cd;
            color:#856404;
        }

        .maintenance{
            background:#d1ecf1;
            color:#0c5460;
        }

        .spec-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            margin-top:20px;
        }

        .spec-card{
            background:#f8f9fa;
            padding:20px;
            border-radius:12px;
            border:1px solid #ddd;
        }

        .spec-title{
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="detail-box">

    <!-- TITLE -->
    <div class="title">
        Chi tiết phòng
    </div>

    <!-- IMAGE -->
    <div th:if="${room.image != null}">

        <img th:src="@{'/uploads/' + ${room.image}}"
             class="room-image">

    </div>

    <!-- THÔNG TIN -->
    <div class="section-title">
        Thông tin phòng
    </div>

    <div class="info">
        <b>ID:</b>
        <span th:text="${room.id}"></span>
    </div>

    <div class="info">
        <b>Tên phòng:</b>
        <span th:text="${room.roomName}"></span>
    </div>

    <div class="info">
        <b>Giá:</b>
        <span th:text="${#numbers.formatDecimal(room.price,1,0)}"></span>
        VNĐ / giờ
    </div>

    <div class="info">
        <b>Số máy:</b>
        <span th:text="${room.computerCount}"></span>
    </div>

    <div class="info">
        <b>Loại phòng:</b>
        <span th:text="${room.roomType}"></span>
    </div>

    <div class="info">
        <b>Mô tả:</b>
        <span th:text="${room.description}"></span>
    </div>

    <!-- STATUS -->
    <div class="info">

        <b>Trạng thái:</b>

        <span th:if="${room.status.name() == 'AVAILABLE'}"
              class="status available">
            Trống
        </span>

        <span th:if="${room.status.name() == 'OCCUPIED'}"
              class="status occupied">
            Đang sử dụng
        </span>

        <span th:if="${room.status.name() == 'CLEANING'}"
              class="status cleaning">
            Đang dọn dẹp
        </span>

        <span th:if="${room.status.name() == 'MAINTENANCE'}"
              class="status maintenance">
            Bảo trì
        </span>

    </div>

    <!-- CẤU HÌNH -->
    <div class="section-title">
        Cấu hình máy tính
    </div>

    <div class="spec-grid">

        <!-- CPU -->
        <div class="spec-card">
            <div class="spec-title">
                CPU
            </div>

            <div th:text="${room.cpu}"></div>
        </div>

        <!-- RAM -->
        <div class="spec-card">
            <div class="spec-title">
                RAM
            </div>

            <div th:text="${room.ram}"></div>
        </div>

        <!-- VGA -->
        <div class="spec-card">
            <div class="spec-title">
                VGA
            </div>

            <div th:text="${room.vga}"></div>
        </div>

        <!-- SSD -->
        <div class="spec-card">
            <div class="spec-title">
                SSD
            </div>

            <div th:text="${room.ssd}"></div>
        </div>

        <!-- MONITOR -->
        <div class="spec-card">
            <div class="spec-title">
                Màn hình
            </div>

            <div th:text="${room.monitor}"></div>
        </div>

    </div>

    <!-- BUTTON -->
    <div class="mt-4 d-flex gap-2">

        <a href="/rooms"
           class="btn btn-secondary">
            Quay lại
        </a>

        <a th:href="@{/edit/{id}(id=${room.id})}"
           class="btn btn-warning">
            Sửa
        </a>

    </div>

</div>

</body>
</html>
