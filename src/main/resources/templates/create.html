<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật phòng' : 'Thêm phòng'"></title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .error{
            color:red;
            font-size:14px;
            margin-top:-15px;
            margin-bottom:15px;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
        }

        .preview-image{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
        }

        .section-title{
            margin-top:30px;
            margin-bottom:20px;
            font-size:22px;
            font-weight:bold;
            color:#333;
            border-bottom:2px solid #ddd;
            padding-bottom:10px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1 th:text="${isEdit} ? 'Cập nhật phòng internet' : 'Thêm phòng internet'"></h1>

    <form th:action="${isEdit} ? '/update' : '/save'"
          th:object="${room}"
          method="post"
          enctype="multipart/form-data">

        <!-- ID -->
        <input type="hidden" th:field="*{id}">

        <!-- GIỮ ẢNH -->
        <input type="hidden" th:field="*{image}">

        <!-- XEM ẢNH -->
        <div th:if="${room.image != null}">

            <img th:src="@{'/uploads/' + ${room.image}}"
                 class="preview-image">

        </div>

        <!-- UPLOAD -->
        <label>Ảnh phòng</label>

        <input type="file"
               name="imageFile"
               accept="image/*">

        <!-- THÔNG TIN PHÒNG -->
        <div class="section-title">
            Thông tin phòng
        </div>

        <label>Tên phòng</label>

        <input type="text" th:field="*{roomName}">

        <div class="error"
             th:if="${#fields.hasErrors('roomName')}"
             th:errors="*{roomName}">
        </div>

        <label>Giá phòng</label>

        <input type="number" th:field="*{price}">

        <div class="error"
             th:if="${#fields.hasErrors('price')}"
             th:errors="*{price}">
        </div>

        <label>Số máy tính</label>

        <input type="number" th:field="*{computerCount}">

        <div class="error"
             th:if="${#fields.hasErrors('computerCount')}"
             th:errors="*{computerCount}">
        </div>

        <label>Loại phòng</label>

        <select th:field="*{roomType}">
            <option value="">-- Chọn loại phòng --</option>
            <option value="VIP">VIP</option>
            <option value="NORMAL">Thường</option>
        </select>

        <div class="error"
             th:if="${#fields.hasErrors('roomType')}"
             th:errors="*{roomType}">
        </div>

        <label>Mô tả</label>

        <textarea rows="4"
                  th:field="*{description}">
        </textarea>

        <div class="error"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}">
        </div>

        <!-- CẤU HÌNH -->
        <div class="section-title">
            Cấu hình máy tính
        </div>

        <label>CPU</label>

        <input type="text"
               th:field="*{cpu}"
               placeholder="Ví dụ: Intel Core i5 12400F">

        <div class="error"
             th:if="${#fields.hasErrors('cpu')}"
             th:errors="*{cpu}">
        </div>

        <label>RAM</label>

        <input type="text"
               th:field="*{ram}"
               placeholder="Ví dụ: 16GB DDR4">

        <div class="error"
             th:if="${#fields.hasErrors('ram')}"
             th:errors="*{ram}">
        </div>

        <label>VGA</label>

        <input type="text"
               th:field="*{vga}"
               placeholder="Ví dụ: RTX 3060">

        <div class="error"
             th:if="${#fields.hasErrors('vga')}"
             th:errors="*{vga}">
        </div>

        <label>SSD</label>

        <input type="text"
               th:field="*{ssd}"
               placeholder="Ví dụ: SSD NVME 512GB">

        <div class="error"
             th:if="${#fields.hasErrors('ssd')}"
             th:errors="*{ssd}">
        </div>

        <label>Màn hình</label>

        <input type="text"
               th:field="*{monitor}"
               placeholder="Ví dụ: 27 inch 144Hz">

        <div class="error"
             th:if="${#fields.hasErrors('monitor')}"
             th:errors="*{monitor}">
        </div>

        <button type="submit"
                th:text="${isEdit} ? 'Cập nhật phòng' : 'Lưu phòng'">
        </button>

    </form>

    <br>

    <a href="/rooms" class="back">
        ← Quay lại danh sách
    </a>

</div>

</body>
</html>
