<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý loại phòng')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý loại phòng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 th:text="${isEdit} ? 'Cập nhật loại phòng' : 'Thêm loại phòng'"></h3>
            <a href="/admin/room-types" class="btn btn-secondary">Quay lại</a>
        </div>

        <div class="card-box">
        <form th:action="${isEdit} ? '/admin/room-types/update' : '/admin/room-types/save'" th:object="${roomType}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="mb-3">
                <label class="form-label">Tên loại phòng</label>
                <input type="text" class="form-control" th:field="*{name}">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <button type="submit" class="btn btn-success" th:text="${isEdit} ? 'Cập nhật' : 'Lưu'"></button>
        </form>
    </div>
    </div>
</div>
</body>
</html>
