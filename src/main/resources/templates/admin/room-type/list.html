<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý loại phòng')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý loại phòng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="mb-3 d-flex justify-content-end">
        <a href="/admin/room-types/create" class="btn btn-success">+ Thêm loại phòng</a>
    </div>
    
    <div class="card-box">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Loại Phòng</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rt : ${list}">
                    <td th:text="${rt.id}"></td>
                    <td th:text="${rt.name}"></td>
                    <td>
                        <a th:href="@{/admin/room-types/edit/{id}(id=${rt.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/admin/room-types/delete/{id}(id=${rt.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="3" class="text-center">Chưa có loại phòng nào.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
