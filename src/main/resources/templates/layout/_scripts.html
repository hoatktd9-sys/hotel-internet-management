<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="scripts">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap 5 Bundle JS with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- DataTables Core JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <!-- DataTables Bootstrap 5 JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

    <!-- Custom Utility Scripts -->
    <script th:inline="javascript">
        $(document).ready(function() {
            // Sidebar Mobile Toggle
            $('#sidebarToggle').on('click', function() {
                $('.sidebar').toggleClass('show');
            });

            // Initialize all Tooltips
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });

            // Auto-trigger DataTables on tables marked with class .dataTable-custom
            $('.dataTable-custom').DataTable({
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/1.13.7/i18n/vi.json'
                },
                responsive: true
            });

            // SweetAlert2 Flash Notification System
            /*[# th:if="${success}"]*/
            var successMessage = /*[[${success}]]*/ 'Thao tác thành công!';
            Swal.fire({
                icon: 'success',
                title: 'Thành công!',
                text: successMessage,
                background: '#111827',
                color: '#ffffff',
                confirmButtonColor: '#00f2fe',
                iconColor: '#39ff14',
                customClass: {
                    popup: 'border border-secondary-subtle'
                }
            });
            /*[/]*/

            /*[# th:if="${error}"]*/
            var errorMessage = /*[[${error}]]*/ 'Đã xảy ra lỗi!';
            Swal.fire({
                icon: 'error',
                title: 'Lỗi!',
                text: errorMessage,
                background: '#111827',
                color: '#ffffff',
                confirmButtonColor: '#ff073a',
                iconColor: '#ff073a',
                customClass: {
                    popup: 'border border-secondary-subtle'
                }
            });
            /*[/]*/
        });
    </script>
</th:block>

</body>
</html>
