<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật phòng' : 'Thêm phòng'"></title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .error{
            color:red;
            font-size:14px;
            margin-top:-15px;
            margin-bottom:15px;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="container">

    <h1 th:text="${isEdit} ? 'Cập nhật phòng internet' : 'Thêm phòng internet'"></h1>

    <form th:action="${isEdit} ? '/update' : '/save'"
          th:object="${room}"
          method="post"
          enctype="multipart/form-data">

        <!-- ID ẩn để update -->
        <input type="hidden" th:field="*{id}">

        <label>Tên phòng</label>

        <input type="text" th:field="*{roomName}">

        <div class="error"
             th:if="${#fields.hasErrors('roomName')}"
             th:errors="*{roomName}">
        </div>


        <label>Giá phòng</label>

        <input type="number" th:field="*{price}">

        <div class="error"
             th:if="${#fields.hasErrors('price')}"
             th:errors="*{price}">
        </div>


        <label>Số máy tính</label>

        <input type="number" th:field="*{computerCount}">

        <div class="error"
             th:if="${#fields.hasErrors('computerCount')}"
             th:errors="*{computerCount}">
        </div>


        <label>Loại phòng</label>

        <div th:if="${roomTypes == null or roomTypes.empty}" style="color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
            Chưa có loại phòng nào. Vui lòng <a href="/room-types" style="color: #0056b3; font-weight: bold;">tạo loại phòng trước</a>.
        </div>

        <select th:field="*{roomType.id}" th:unless="${roomTypes == null or roomTypes.empty}">
            <option value="">-- Chọn loại phòng --</option>
            <option th:each="rt : ${roomTypes}"
                    th:value="${rt.id}"
                    th:text="${rt.name}">
            </option>
        </select>

        <div class="error"
             th:if="${#fields.hasErrors('roomType')}"
             th:errors="*{roomType}">
        </div>

        <label>Hình ảnh phòng</label>
        
        <div th:if="${room.image != null}">
            <img th:src="${room.image}" alt="Room Image" style="max-width: 200px; max-height: 200px; display: block; margin-bottom: 10px; border-radius: 5px;">
        </div>

        <input type="file" name="imageFile" accept="image/*">


        <label>Mô tả</label>

        <textarea rows="4"
                  th:field="*{description}">
        </textarea>

        <div class="error"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}">
        </div>


        <button type="submit"
                th:text="${isEdit} ? 'Cập nhật phòng' : 'Lưu phòng'">
        </button>

    </form>

    <br>

    <a href="/rooms" class="back">
        ← Quay lại danh sách
    </a>

</div>

</body>
</html>
