<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${isEdit} ? 'Sửa phòng internet' : 'Thêm phòng internet')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý phòng internet')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div style="max-width: 700px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 th:text="${isEdit} ? 'Sửa phòng internet' : 'Thêm phòng internet'"></h3>
            <a href="/rooms" class="btn btn-secondary">Quay lại danh sách</a>
        </div>

        <div class="card-box">
            <form th:action="${isEdit} ? '/update' : '/save'"
                  th:object="${room}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- ID -->
                <input type="hidden" th:field="*{id}">

                <!-- GIỮ ẢNH -->
                <input type="hidden" th:field="*{image}">

                <!-- XEM ẢNH -->
                <div th:if="${room.image != null}" class="mb-3">
                    <label class="form-label d-block">Ảnh phòng hiện tại</label>
                    <img th:src="@{'/uploads/' + ${room.image}}" class="img-thumbnail" style="max-height: 200px; object-fit: cover;">
                </div>

                <!-- UPLOAD -->
                <div class="mb-3">
                    <label class="form-label">Tải lên ảnh mới</label>
                    <input type="file" name="imageFile" class="form-control" accept="image/*">
                </div>

                <div class="h5 border-bottom pb-2 mb-3 text-secondary">Thông tin phòng</div>

                <div class="mb-3">
                    <label class="form-label">Tên phòng</label>
                    <input type="text" class="form-control" th:field="*{roomName}">
                    <div class="text-danger" th:if="${#fields.hasErrors('roomName')}" th:errors="*{roomName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giá phòng (VNĐ / giờ)</label>
                    <input type="number" class="form-control" th:field="*{price}">
                    <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Số máy tính</label>
                    <input type="number" class="form-control" th:field="*{computerCount}">
                    <div class="text-danger" th:if="${#fields.hasErrors('computerCount')}" th:errors="*{computerCount}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Loại phòng</label>
                    <div th:if="${roomTypes == null or roomTypes.empty}" class="alert alert-warning mb-2 py-2">
                        Chưa có loại phòng nào. Vui lòng <a href="/admin/room-types" class="alert-link">tạo loại phòng trước</a>.
                    </div>
                    <select class="form-select" th:field="*{roomType.id}" th:unless="${roomTypes == null or roomTypes.empty}">
                        <option value="">-- Chọn loại phòng --</option>
                        <option th:each="rt : ${roomTypes}"
                                th:value="${rt.id}"
                                th:text="${rt.name}">
                        </option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('roomType')}" th:errors="*{roomType}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả chi tiết</label>
                    <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="h5 border-bottom pb-2 mb-3 text-secondary">Cấu hình máy tính</div>

                <div class="mb-3">
                    <label class="form-label">CPU</label>
                    <input type="text" class="form-control" th:field="*{cpu}" placeholder="Ví dụ: Intel Core i5 12400F">
                    <div class="text-danger" th:if="${#fields.hasErrors('cpu')}" th:errors="*{cpu}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">RAM</label>
                    <input type="text" class="form-control" th:field="*{ram}" placeholder="Ví dụ: 16GB DDR4">
                    <div class="text-danger" th:if="${#fields.hasErrors('ram')}" th:errors="*{ram}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">VGA (Card đồ họa)</label>
                    <input type="text" class="form-control" th:field="*{vga}" placeholder="Ví dụ: RTX 3060">
                    <div class="text-danger" th:if="${#fields.hasErrors('vga')}" th:errors="*{vga}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">SSD</label>
                    <input type="text" class="form-control" th:field="*{ssd}" placeholder="Ví dụ: SSD NVME 512GB">
                    <div class="text-danger" th:if="${#fields.hasErrors('ssd')}" th:errors="*{ssd}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Màn hình</label>
                    <input type="text" class="form-control" th:field="*{monitor}" placeholder="Ví dụ: 27 inch 144Hz">
                    <div class="text-danger" th:if="${#fields.hasErrors('monitor')}" th:errors="*{monitor}"></div>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 fw-bold" th:text="${isEdit} ? 'Cập nhật phòng' : 'Lưu phòng'"></button>

            </form>
        </div>
    </div>
</div>
</body>
</html>
