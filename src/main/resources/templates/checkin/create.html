<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Nhận phòng - Check In')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Nhận phòng - Check In')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-box-arrow-in-right text-success"></i> Nhận phòng (Check In)</h3>
            <div class="d-flex gap-2">
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
            </div>
        </div>

        <div class="card-box bg-white p-4 rounded shadow-sm">
        <form th:action="@{/checkin/save}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Khách hàng</label>
                <input type="text" id="customerSearch" class="form-control mb-1" placeholder="Nhập tên hoặc CCCD để tìm kiếm..." list="customerDatalist" autocomplete="off" required>
                <datalist id="customerDatalist">
                    <option th:each="c : ${customers}" 
                            th:value="${c.fullName + ' - CCCD: ' + c.identityNumber}" 
                            th:data-id="${c.id}"></option>
                </datalist>
                <input type="hidden" name="customerId" id="customerId" required>
                <div id="customerSearchFeedback" class="form-text text-muted">Vui lòng nhập và chọn khách hàng từ danh sách.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Phòng</label>
                <select name="roomId" class="form-select" required>
                    <option value="">-- Chọn phòng --</option>
                    <option th:each="r : ${rooms}" 
                            th:value="${r.id}" 
                            th:text="${r.roomName + ' (Giá: ' + #numbers.formatDecimal(r.price, 1, 'POINT', 0, 'COMMA') + 'đ/h)'}"
                            th:selected="${r.id == selectedRoomId}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Thời gian thuê dự kiến (giờ)</label>
                <input type="number" step="0.5" min="0.5" name="expectedHours" value="2.0" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"><i class="bi bi-play-fill"></i> Check In (Tạo phiếu thuê)</button>
        </form>
    </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('customerSearch');
    const hiddenInput = document.getElementById('customerId');
    const datalist = document.getElementById('customerDatalist');
    const feedback = document.getElementById('customerSearchFeedback');

    searchInput.addEventListener('input', function() {
        const value = this.value;
        let found = false;
        const options = datalist.options;
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === value) {
                hiddenInput.value = options[i].getAttribute('data-id');
                feedback.innerHTML = '<span class="text-success"><i class="bi bi-check-circle-fill"></i> Đã chọn: ' + value + '</span>';
                found = true;
                break;
            }
        }
        if (!found) {
            hiddenInput.value = '';
            feedback.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle-fill"></i> Vui lòng chọn một khách hàng hợp lệ từ danh sách gợi ý.</span>';
        }
    });
});
</script>
</body>
</html>
