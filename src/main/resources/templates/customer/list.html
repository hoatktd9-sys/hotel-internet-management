<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý khách hàng')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý khách hàng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="mb-3 d-flex justify-content-end">
        <a href="/customers/create" class="btn btn-success" sec:authorize="hasAuthority('Create_Customer')">+ Thêm khách hàng</a>
    </div>
    
    <div class="card-box">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>CCCD</th>
                    <th>Số điện thoại</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${list}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.fullName}"></td>
                    <td th:text="${c.identityNumber}"></td>
                    <td th:text="${c.phoneNumber}"></td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/customers/edit/{id}(id=${c.id})}" sec:authorize="hasAuthority('Edit_Customer')" class="btn btn-warning btn-sm">Sửa</a>
                            <a th:href="@{/customers/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm" sec:authorize="hasAuthority('Delete_Customer')" onclick="return confirm('Bạn có chắc muốn xóa khách hàng này?')">Xóa</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
