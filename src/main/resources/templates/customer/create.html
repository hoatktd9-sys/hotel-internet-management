<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <!-- TITLE -->

        <h2 class="mb-4"
            th:text="${isEdit} ? 'Sửa khách hàng' : 'Thêm khách hàng'">

            Thêm khách hàng

        </h2>

        <!-- FORM -->

        <form th:action="${isEdit} ? '/customers/update' : '/customers/save'"
              th:object="${customer}"
              method="post">

            <!-- ID ẨN -->

            <input type="hidden"
                   th:field="*{id}">

            <!-- HỌ TÊN -->

            <div class="mb-3">

                <label>Họ tên</label>

                <input type="text"
                       class="form-control"
                       th:field="*{fullName}">

                <div class="text-danger"
                     th:errors="*{fullName}">
                </div>

            </div>

            <!-- CCCD -->

            <div class="mb-3">

                <label>CCCD / Passport</label>

                <input type="text"
                       class="form-control"
                       th:field="*{identityNumber}">

                <div class="text-danger"
                     th:errors="*{identityNumber}">
                </div>

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label>Số điện thoại</label>

                <input type="text"
                       class="form-control"
                       th:field="*{phoneNumber}">

                <div class="text-danger"
                     th:errors="*{phoneNumber}">
                </div>

            </div>

            <!-- BUTTON -->

            <button type="submit"
                    class="btn btn-success">

                <span th:text="${isEdit} ? 'Cập nhật' : 'Lưu khách hàng'">
                    Lưu
                </span>

            </button>

            <a href="/customers"
               class="btn btn-secondary">

                Quay lại

            </a>

        </form>

    </div>

</div>

</body>
</html>
