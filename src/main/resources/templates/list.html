<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng internet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; padding: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .room-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .room-card:hover { transform: translateY(-5px); }
        .room-image { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        .room-name { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .room-info { margin-bottom: 10px; font-size: 17px; }
        .status { font-weight: bold; padding: 6px 14px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
        .available { background: #d4edda; color: #155724; }
        .occupied { background: #f8d7da; color: #721c24; }
        .cleaning { background: #fff3cd; color: #856404; }
        .maintenance { background: #e2e3e5; color: #383d41; }
        .btn-group-custom { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <h1>Quản lý phòng internet</h1>
        <div class="d-flex gap-2 align-items-center">
            <span class="me-2">Xin chào, <b class="text-primary" sec:authentication="name">User</b>!</span>

            <a href="/create" class="btn btn-success" sec:authorize="hasAuthority('Create_Room')">+ Thêm phòng</a>

            <a href="/admin/users" class="btn btn-success" sec:authorize="hasAuthority('Create_Room')">Danh sách Nhân Viên</a>

            <a href="/admin/room-types" class="btn btn-info text-white">Quản lý loại phòng</a>

            <a href="/customers" class="btn btn-secondary text-white">Quản lý khách hàng</a>
            <a href="/service-categories" class="btn btn-warning text-white" sec:authorize="hasAuthority('Admin_Service')">Quản lý dịch vụ</a>
            <a href="/checkin" class="btn btn-primary">Check-in</a>
            <a href="/checkin/history" class="btn btn-dark">Lịch sử</a>
            <a href="/logout" class="btn btn-light border">Đăng xuất</a>
        </div>
    </div>

    <div class="room-grid">
        <div class="room-card" th:each="r : ${list}">
            <div>
                <img th:if="${r.image != null and r.image != ''}" th:src="@{'/uploads/images/' + ${r.image}}" class="room-image" alt="Room Image">
                <img th:if="${r.image == null or r.image == ''}" src="https://via.placeholder.com/400x200?text=No+Image" class="room-image" alt="No Image">
            </div>

            <div class="room-name" th:text="${r.roomName}"></div>

            <div class="room-info">
                <b>Giá:</b> <span th:text="${#numbers.formatDecimal(r.price,1,0)}"></span> VNĐ / giờ
            </div>
            <div class="room-info">
                <b>Số máy:</b> <span th:text="${r.computerCount}"></span>
            </div>
            <div class="room-info">
                <b>Loại:</b> <span th:text="${r.roomType != null ? r.roomType.name : 'Chưa phân loại'}"></span>
            </div>

            <div>
                <span th:if="${r.status.name() == 'AVAILABLE'}" class="status available">Trống</span>
                <span th:if="${r.status.name() == 'OCCUPIED'}" class="status occupied">Đang sử dụng</span>
                <span th:if="${r.status.name() == 'CLEANING'}" class="status cleaning">Đang dọn dẹp</span>
                <span th:if="${r.status.name() == 'MAINTENANCE'}" class="status maintenance">Bảo trì</span>
            </div>

            <div class="room-info">
                <b>Mô tả:</b> <span th:text="${r.description}"></span>
            </div>

            <div class="btn-group-custom">
                <a th:href="@{/edit/{id}(id=${r.id})}" class="btn btn-warning btn-sm" sec:authorize="hasAuthority('Edit_Room')">Sửa</a>

                <a th:href="@{/room/delete/{id}(id=${r.id})}" class="btn btn-danger btn-sm"
                   sec:authorize="hasAuthority('Delete_Room')"
                   onclick="return confirm('Bạn có chắc muốn xóa phòng này?')">Xóa</a>

                <a th:if="${r.status.name() == 'OCCUPIED'}" th:href="@{/checkout/{id}(id=${r.id})}" class="btn btn-primary btn-sm">Check-out</a>

                <a th:if="${r.status.name() == 'AVAILABLE'}" th:href="@{/change-status/{id}/{status}(id=${r.id},status='CLEANING')}" class="btn btn-warning btn-sm">Dọn dẹp</a>
                <a th:if="${r.status.name() == 'CLEANING'}" th:href="@{/room/available/{id}(id=${r.id})}" class="btn btn-success btn-sm">Hoàn tất dọn dẹp</a>

                <a th:if="${r.status.name() == 'AVAILABLE'}" th:href="@{/change-status/{id}/{status}(id=${r.id},status='MAINTENANCE')}" class="btn btn-dark btn-sm">Bảo trì</a>
                <a th:if="${r.status.name() == 'MAINTENANCE'}" th:href="@{/room/available/{id}(id=${r.id})}" class="btn btn-success btn-sm">Kết thúc bảo trì</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
