<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Nhận phòng - Check In')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Nhận phòng - Check In')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Nhận phòng (Check In)</h3>
            <a href="/rooms" class="btn btn-secondary">Quay lại</a>
        </div>

        <div class="card-box">
        <form th:action="@{/checkin/save}" method="post">
            <div class="mb-3">
                <label class="form-label">Khách hàng</label>
                <select name="customerId" class="form-select" required>
                    <option value="">-- Chọn khách --</option>
                    <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.fullName}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Phòng</label>
                <select name="roomId" class="form-select" required>
                    <option value="">-- Chọn phòng --</option>
                    <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.roomName}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Check In</button>
        </form>
    </div>
    </div>
</div>
</body>
</html>
