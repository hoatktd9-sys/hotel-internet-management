<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Thêm khách hàng
        </h2>

        <form th:action="@{/customers/save}"
              th:object="${customer}"
              method="post">

            <div class="mb-3">

                <label>Họ tên</label>

                <input type="text"
                       class="form-control"
                       th:field="*{fullName}">

                <div class="text-danger"
                     th:errors="*{fullName}">
                </div>

            </div>

            <div class="mb-3">

                <label>CCCD / Passport</label>

                <input type="text"
                       class="form-control"
                       th:field="*{identityNumber}">

                <div class="text-danger"
                     th:errors="*{identityNumber}">
                </div>

            </div>

            <div class="mb-3">

                <label>Số điện thoại</label>

                <input type="text"
                       class="form-control"
                       th:field="*{phoneNumber}">

                <div class="text-danger"
                     th:errors="*{phoneNumber}">
                </div>

            </div>

            <button type="submit"
                    class="btn btn-success">
                Lưu khách hàng
            </button>

            <a href="/customers"
               class="btn btn-secondary">
                Quay lại
            </a>

        </form>

    </div>

</div>

</body>
</html>
