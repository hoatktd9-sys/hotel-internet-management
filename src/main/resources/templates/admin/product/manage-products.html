<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý thực đơn - Gaming Hotel')}"></head>
<body>
<div class="container-fluid">
    <!-- UNIFIED NAVBAR -->
    <div th:replace="~{fragments/layout :: navbar('Quản lý thực đơn')}"></div>

    <div class="card-box mt-4 bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold mb-0 text-dark" style="font-size: 1.6rem;">
                <i class="bi bi-egg-fried text-warning"></i> QUẢN LÝ CHI TIẾT THỰC ĐƠN &amp; SẢN PHẨM
            </h2>
            <div class="d-flex gap-2">
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
                <a href="/service-categories" class="btn btn-info text-white fw-bold"><i class="bi bi-grid-fill"></i> Quản lý nhóm dịch vụ</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <!-- LEFT PANEL: FORM -->
            <div class="col-lg-4 col-md-5">
                <div class="p-3 bg-light rounded border">
                    <h4 class="mb-3 text-secondary fw-bold border-bottom pb-2" th:text="${product.id != null} ? 'Cập Nhật Món Ăn' : 'Thêm Món Mới Vào Thực Đơn'">Thêm Món Mới</h4>

                    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold small text-dark">Tên món ăn / nước uống <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Ví dụ: Mì xào bò, Coca Cola, Sting..." required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label fw-bold small text-dark">Thuộc danh mục nhóm lớn <span class="text-danger">*</span></label>
                            <select th:field="*{category}" id="category" class="form-select" required>
                                <option value="">-- Chọn nhóm danh mục --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="price" class="form-label fw-bold small text-dark">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                                <input type="number" step="500" th:field="*{price}" id="price" class="form-control" placeholder="0" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="stockQuantity" class="form-label fw-bold small text-dark">Số lượng kho <span class="text-danger">*</span></label>
                                <input type="number" th:field="*{stockQuantity}" id="stockQuantity" class="form-control" placeholder="0" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold small text-dark">Mô tả ngắn hoặc ghi chú</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="3" placeholder="Ghi chú nguyên liệu, cách chế biến..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success w-100 fw-bold" th:text="${product.id != null} ? 'Cập Nhật Món' : 'Thêm Vào Thực Đơn'"></button>
                            <a th:if="${product.id != null}" href="/admin/products" class="btn btn-outline-secondary w-100 fw-bold">Hủy sửa</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- RIGHT PANEL: TABLE LIST -->
            <div class="col-lg-8 col-md-7">
                <div class="table-responsive">
                    <table class="table table-bordered table-striped table-hover align-middle bg-white mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th style="width: 60px;" class="text-center">ID</th>
                            <th>Tên món / Sản phẩm</th>
                            <th>Nhóm danh mục</th>
                            <th>Giá bán</th>
                            <th style="width: 110px;" class="text-center">Số lượng kho</th>
                            <th>Ghi chú / Mô tả</th>
                            <th style="width: 140px;" class="text-center">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="prod : ${products}">
                            <td class="text-center fw-bold" th:text="${prod.id}"></td>
                            <td><span th:text="${prod.name}" class="fw-bold text-dark"></span></td>
                            <td><span class="badge bg-info text-dark fw-bold" th:text="${prod.category != null ? prod.category.name : 'Chưa phân nhóm'}"></span></td>
                            <td th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'" class="text-end text-danger fw-bold"></td>
                            <td class="text-center">
                                <span th:text="${prod.stockQuantity}" th:class="${prod.stockQuantity <= 5} ? 'badge bg-danger px-2 py-1' : 'badge bg-success px-2 py-1'"></span>
                            </td>
                            <td th:text="${prod.description}" class="text-muted small"></td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/admin/products/edit/{id}(id=${prod.id})}" class="btn btn-warning fw-bold text-dark"><i class="bi bi-pencil-square"></i> Sửa</a>
                                    <a th:href="@{/admin/products/delete/{id}(id=${prod.id})}"
                                       class="btn btn-danger fw-bold"
                                       onclick="return confirm('Bạn có chắc chắn muốn gỡ bỏ món này khỏi thực đơn không?')"><i class="bi bi-trash"></i> Xóa</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center text-muted py-4"><i class="bi bi-folder-x" style="font-size: 2rem;"></i><br>Chưa có sản phẩm nào được nhập. Hãy thêm sản phẩm ở form bên trái!</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


</body>
</html>
