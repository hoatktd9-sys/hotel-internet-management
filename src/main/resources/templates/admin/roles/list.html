<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý Quyền - Admin')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Quản lý Quyền (Roles)')}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card-box">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-shield-lock-fill text-primary"></i> Quản lý Roles & Permissions</h3>
            <div class="d-flex gap-2">
                <a href="/admin/roles/create" sec:authorize="hasRole('ADMIN')" class="btn btn-success fw-bold"><i class="bi bi-plus-circle"></i> Thêm Vị Trí</a>
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
            </div>
        </div>
        <table class="table table-bordered table-striped bg-white mt-4">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên Role</th>
            <th>Mô tả</th>
            <th>Các Quyền đang có</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${roles}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.roleName}"></td>
            <td th:text="${r.description}"></td>
            <td>
                <span th:each="p : ${r.permissions}" class="badge bg-secondary me-1" th:text="${p.permissionName}"></span>
            </td>
            <td>
                <button type="button" class="btn btn-sm btn-info text-white" data-bs-toggle="modal" th:data-bs-target="'#editPermissionsModal' + ${r.id}">
                    Chỉnh sửa Quyền
                </button>
                <a th:href="@{/admin/roles/delete/{id}(id=${r.id})}" class="btn btn-sm btn-danger">
                    Xóa Quyền
                </a>

            </td>
        </tr>
        </tbody>
    </table>
    </div>
</div>

<!-- Modals for Editing Permissions -->
<div th:each="r : ${roles}">
    <div class="modal fade" th:id="'editPermissionsModal' + ${r.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/roles/update-permissions/{id}(id=${r.id})}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="'Bật/tắt quyền cho Role: ' + ${r.roleName}"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-muted">Chọn các quyền bạn muốn bật cho Role này:</p>
                        <div th:each="p : ${allPermissions}" class="form-check">
                            <input class="form-check-input" type="checkbox" name="permissionIds" th:value="${p.id}" th:id="'r'+${r.id}+'p'+${p.id}"
                                   th:checked="${#lists.contains(r.permissions, p)}">
                            <label class="form-check-label" th:for="'r'+${r.id}+'p'+${p.id}">
                                <strong th:text="${p.permissionName}"></strong>
                                <small class="text-muted" th:text="' - ' + ${p.description}"></small>
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


</body>
</html>
