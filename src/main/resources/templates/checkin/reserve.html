<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Đặt trước phòng - Gaming Hotel')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: navbar('Đặt trước phòng')}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0 text-dark"><i class="bi bi-calendar-event text-warning"></i> Đặt trước phòng (Pre-book Room)</h3>
            <div class="d-flex gap-2">
                <a href="/rooms" class="btn btn-secondary fw-bold"><i class="bi bi-house"></i> Quay lại trang chủ</a>
            </div>
        </div>

        <div class="card-box bg-white p-4 rounded shadow-sm">
            <form th:action="@{/reserve/save}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Khách hàng</label>
                    <select name="customerId" class="form-select" required>
                        <option value="">-- Chọn khách hàng --</option>
                        <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.fullName + ' - CCCD: ' + c.identityNumber}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn phòng trống</label>
                    <select name="roomId" class="form-select" required>
                        <option value="">-- Chọn phòng --</option>
                        <option th:each="r : ${rooms}" 
                                th:value="${r.id}" 
                                th:text="${r.roomName + ' (Giá: ' + #numbers.formatDecimal(r.price,1,0) + 'đ/h)'}"
                                th:selected="${r.id == selectedRoomId}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Thời gian nhận phòng dự kiến</label>
                    <input type="datetime-local" name="checkInTimeStr" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Thời gian sử dụng dự kiến (giờ)</label>
                    <input type="number" step="0.5" min="0.5" name="expectedHours" value="2.0" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"><i class="bi bi-calendar-check"></i> Đặt phòng ngay</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
