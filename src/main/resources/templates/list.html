<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng internet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .room-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        /* CSS CHO ẢNH (MỚI THÊM) */
        .room-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }

        .room-card:hover {
            transform: translateY(-5px);
        }

        .room-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .room-info {
            margin-bottom: 10px;
            font-size: 17px;
        }

        .status {
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .available {
            background: #d4edda;
            color: #155724;
        }

        .occupied {
            background: #f8d7da;
            color: #721c24;
        }

        .cleaning {
            background: #fff3cd;
            color: #856404;
        }

        .maintenance {
            background: #d1ecf1;
            color: #0c5460;
        }

        .btn-group-custom {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="top-bar">
        <h1>Quản lý phòng internet</h1>

        <div class="d-flex gap-2">
            <!-- THÊM PHÒNG -->
            <a href="/create" class="btn btn-success">
                + Thêm phòng
            </a>

            <!-- CHECK-IN -->
            <a href="/checkin" class="btn btn-primary">
                Check-in
            </a>

            <!-- KHÁCH HÀNG (MỚI THÊM) -->
            <a href="/customers" class="btn btn-warning">
                Khách hàng
            </a>

            <!-- LỊCH SỬ -->
            <a href="/checkin/history" class="btn btn-dark">
                Lịch sử
            </a>
        </div>
    </div>

    <!-- SEARCH + FILTER (ĐÃ CẬP NHẬT) -->
    <div class="card p-3 mb-4 shadow-sm">

        <form action="/rooms/search" method="get">

            <div class="row g-2">

                <!-- KEYWORD -->
                <div class="col-md-4">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Tên / loại / mô tả..."
                           th:value="${keyword}">
                </div>

                <!-- STATUS -->
                <div class="col-md-3">
                    <select name="status"
                            class="form-select">

                        <option value="">
                            -- Tất cả trạng thái --
                        </option>

                        <option value="AVAILABLE">
                            Trống
                        </option>

                        <option value="OCCUPIED">
                            Đang sử dụng
                        </option>

                        <option value="CLEANING">
                            Đang dọn dẹp
                        </option>

                        <option value="MAINTENANCE">
                            Bảo trì
                        </option>

                    </select>
                </div>

                <!-- ROOM TYPE -->
                <div class="col-md-3">
                    <select name="roomType"
                            class="form-select">

                        <option value="">
                            -- Tất cả loại phòng --
                        </option>

                        <option value="NORMAL">
                            NORMAL
                        </option>

                        <option value="VIP">
                            VIP
                        </option>

                    </select>
                </div>

                <!-- BUTTON -->
                <div class="col-md-2 d-grid">
                    <button type="submit"
                            class="btn btn-primary">
                        Tìm kiếm
                    </button>
                </div>

            </div>

        </form>

        <!-- FILTER NHANH -->
        <div class="mt-3 d-flex gap-2 flex-wrap">

            <a href="/rooms"
               class="btn btn-secondary">
                Tất cả
            </a>

            <a href="/status/AVAILABLE"
               class="btn btn-success">
                Trống
            </a>

            <a href="/status/OCCUPIED"
               class="btn btn-danger">
                Đang sử dụng
            </a>

            <a href="/status/CLEANING"
               class="btn btn-warning">
                Đang dọn dẹp
            </a>

            <a href="/status/MAINTENANCE"
               class="btn btn-info">
                Bảo trì
            </a>

        </div>

    </div>

    <!-- DANH SÁCH PHÒNG -->
    <div class="room-grid">
        <div class="room-card" th:each="r : ${list}">

            <!-- ẢNH PHÒNG (MỚI THÊM) -->
            <div>

                <!-- CÓ ẢNH -->
                <img th:if="${r.image != null}"
                     th:src="@{'/uploads/' + ${r.image}}"
                     class="room-image">

                <!-- KHÔNG CÓ ẢNH -->
                <img th:if="${r.image == null}"
                     src="https://via.placeholder.com/400x200?text=No+Image"
                     class="room-image">

            </div>

            <!-- TÊN PHÒNG -->
            <div class="room-name"
                 th:text="${r.roomName}">
            </div>

            <!-- GIÁ -->
            <div class="room-info">
                <b>Giá:</b>
                <span th:text="${#numbers.formatDecimal(r.price,1,0)}"></span>
                VNĐ / giờ
            </div>

            <!-- SỐ MÁY -->
            <div class="room-info">
                <b>Số máy:</b>
                <span th:text="${r.computerCount}"></span>
            </div>

            <!-- LOẠI -->
            <div class="room-info">
                <b>Loại:</b>
                <span th:text="${r.roomType}"></span>
            </div>

            <!-- STATUS -->
            <div>

                <!-- AVAILABLE -->
                <span th:if="${r.status.name() == 'AVAILABLE'}"
                      class="status available">
                    Trống
                </span>

                <!-- OCCUPIED -->
                <span th:if="${r.status.name() == 'OCCUPIED'}"
                      class="status occupied">
                    Đang sử dụng
                </span>

                <!-- CLEANING -->
                <span th:if="${r.status.name() == 'CLEANING'}"
                      class="status cleaning">
                    Đang dọn dẹp
                </span>

                <!-- MAINTENANCE -->
                <span th:if="${r.status.name() == 'MAINTENANCE'}"
                      class="status maintenance">
                    Bảo trì
                </span>

            </div>

            <!-- MÔ TẢ -->
            <div class="room-info">
                <b>Mô tả:</b>
                <span th:text="${r.description}"></span>
            </div>

            <!-- BUTTON -->
            <div class="btn-group-custom">

                <!-- CHI TIẾT -->
                <a th:href="@{/room/detail/{id}(id=${r.id})}"
                   class="btn btn-info">
                    Chi tiết
                </a>

                <!-- SỬA -->
                <a th:href="@{/edit/{id}(id=${r.id})}"
                   class="btn btn-warning">
                    Sửa
                </a>

                <!-- XÓA -->
                <a th:href="@{/delete/{id}(id=${r.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('Bạn có chắc muốn xóa?')">
                    Xóa
                </a>

                <!-- CHECK-OUT -->
                <a th:if="${r.status.name() == 'OCCUPIED'}"
                   th:href="@{/checkout/{id}(id=${r.id})}"
                   class="btn btn-primary">
                    Check-out
                </a>

                <!-- CHUYỂN DỌN DẸP (ĐÃ CẬP NHẬT) -->
                <a th:if="${r.status.name() == 'AVAILABLE'}"
                   th:href="@{/change-status/{id}/{status}(id=${r.id},status='CLEANING')}"
                   class="btn btn-warning">
                    Dọn dẹp
                </a>

                <!-- HOÀT TẤT DỌN DẸP -->
                <a th:if="${r.status.name() == 'CLEANING'}"
                   th:href="@{/room/available/{id}(id=${r.id})}"
                   class="btn btn-success">
                    Hoàn tất dọn dẹp
                </a>

                <!-- CHUYỂN BẢO TRÌ (ĐÃ CẬP NHẬT) -->
                <a th:if="${r.status.name() == 'AVAILABLE'}"
                   th:href="@{/change-status/{id}/{status}(id=${r.id},status='MAINTENANCE')}"
                   class="btn btn-dark">
                    Bảo trì
                </a>

                <!-- KẾT THÚC BẢO TRÌ -->
                <a th:if="${r.status.name() == 'MAINTENANCE'}"
                   th:href="@{/room/available/{id}(id=${r.id})}"
                   class="btn btn-success">
                    Kết thúc bảo trì
                </a>

            </div>
        </div>
    </div>
</div>

</body>
</html>
